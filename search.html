<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Recherche - Prevname</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="auth.css?v=4">
    <link rel="stylesheet" href="search.css?v=4">
</head>
<body style="background:#0a0020!important;background-image:radial-gradient(ellipse 600px 500px at 15% 20%,rgba(124,58,237,0.6) 0%,transparent 60%),radial-gradient(ellipse 500px 600px at 80% 30%,rgba(59,130,246,0.5) 0%,transparent 60%),radial-gradient(ellipse 400px 400px at 50% 80%,rgba(139,92,246,0.4) 0%,transparent 60%)!important;min-height:100vh;margin:0;background-attachment:fixed!important">

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-orb orb-4"></div>
    <div class="bg-orb orb-5"></div>

    <div class="bg-particle p1"></div>
    <div class="bg-particle p2"></div>
    <div class="bg-particle p3"></div>
    <div class="bg-particle p4"></div>
    <div class="bg-particle p5"></div>
    <div class="bg-particle p6"></div>
    <div class="bg-particle p7"></div>
    <div class="bg-particle p8"></div>
    <div class="bg-particle p9"></div>
    <div class="bg-particle p10"></div>

    <div class="bg-shape s1"></div>
    <div class="bg-shape s2"></div>
    <div class="bg-shape s3"></div>
    <div class="bg-shape s4"></div>
    <div class="bg-shape s5"></div>

    <nav>
        <div class="nav-inner">
            <div class="nav-left">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 32 32" width="32" height="32">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#7c3aed"/>
                                    <stop offset="100%" stop-color="#3b82f6"/>
                                </linearGradient>
                            </defs>
                            <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                            <path d="M16 6 L16 26 M6 16 L26 16 M10 10 L22 22 M22 10 L10 22" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                            <circle cx="16" cy="16" r="4" fill="url(#logoGrad)"/>
                        </svg>
                    </div>
                    <span class="logo-text">Prevname</span>
                </div>
                <div class="nav-links">
                    <a href="/dashboard.html">Dashboard</a>
                    <a href="/search.html" class="active">Recherche</a>
                </div>
            </div>
            <div class="nav-right">
                <div class="dash-user" style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:rgba(255,255,255,0.6)">
                    <div class="avatar" id="searchAvatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:#fff">U</div>
                    <span id="searchUsername">Utilisateur</span>
                </div>
                <button class="btn-logout" onclick="logout()" style="padding:8px 16px;border:1px solid rgba(239,68,68,0.3);border-radius:8px;background:rgba(239,68,68,0.1);color:#ef4444;font-size:0.8rem;font-weight:600;cursor:pointer">Déconnexion</button>
            </div>
        </div>
    </nav>

    <main class="search-main">
        <div class="search-hero">
            <div class="badge">
                <span class="badge-dot"></span>
                +2,1 milliards de records indexés
            </div>
            <h1>Recherche <span class="highlight">avancée</span></h1>
            <p class="search-subtitle">Recherchez dans des milliards d'enregistrements avec plus de 20 critères différents.</p>
        </div>

        <div class="search-box">
            <div class="search-grid">
                <div class="sg-item"><label>Prénom</label><input type="text" class="sg-input" id="s-firstname" placeholder="Jean"></div>
                <div class="sg-item"><label>Nom</label><input type="text" class="sg-input" id="s-lastname" placeholder="Dupont"></div>
                <div class="sg-item"><label>Pseudo</label><input type="text" class="sg-input" id="s-username" placeholder="pseudo"></div>
                <div class="sg-item"><label>Discord ID</label><input type="text" class="sg-input" id="s-discord" placeholder="123456789012345678"></div>
                <div class="sg-item full"><label>Adresse</label><input type="text" class="sg-input" id="s-address" placeholder="123 rue Example"></div>
                <div class="sg-item full"><label>Code postal</label><input type="text" class="sg-input" id="s-zip" placeholder="75001"></div>
            </div>
            <div style="text-align:center;padding-bottom:24px">
                <button class="btn-search-glow" onclick="doSearch()">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    Rechercher
                </button>
            </div>
        </div>

        <div class="search-results">
            <div class="results-message" id="resultsPlaceholder">
                <div class="rm-icon">
                    <svg viewBox="0 0 24 24" width="56" height="56"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>
                <h3>Prêt à rechercher</h3>
                <p>Utilisez les critères ci-dessus pour effectuer une recherche dans notre base de données.</p>
            </div>
            <div class="results-container" id="resultsContainer"></div>
        </div>
    </main>

    <script>
        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login.html'; return; }
            try {
                const res = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
                if (!res.ok) { localStorage.clear(); window.location.href = '/login.html'; return; }
                const user = await res.json();
                document.getElementById('searchUsername').textContent = user.username;
                document.getElementById('searchAvatar').textContent = user.username.charAt(0).toUpperCase();
            } catch { localStorage.clear(); window.location.href = '/login.html'; }
        }

        function logout() { localStorage.clear(); window.location.href = '/'; }

        function doSearch() {
            const firstname = document.getElementById('s-firstname').value.trim();
            const lastname = document.getElementById('s-lastname').value.trim();
            const username = document.getElementById('s-username').value.trim();
            const discord = document.getElementById('s-discord').value.trim();
            const address = document.getElementById('s-address').value.trim();
            const zip = document.getElementById('s-zip').value.trim();
            const placeholder = document.getElementById('resultsPlaceholder');
            const container = document.getElementById('resultsContainer');
            placeholder.style.display = 'none';
            container.innerHTML = '<div class="no-results">Aucun résultat trouvé</div>';
            const results = [
                { name: 'Jean Dupont', email: 'jean.dupont@email.com', phone: '+33 6 12 34 56 78', address: '12 rue de Paris, 75001 Paris', pseudo: 'jeandu', discord: '123456789012345678', source: 'Fuite 2024', breach: 'LinkedIn' },
                { name: 'Sophie Martin', email: 'sophie.martin@email.com', phone: '+33 6 11 22 33 44', address: '8 rue de la République, 69001 Lyon', pseudo: 'sophmrt', discord: '234567890123456789', source: 'Fuite 2024', breach: 'Twitter' },
                { name: 'Pierre Durand', email: 'pierre.durand@email.com', phone: '+33 6 12 34 56 78', address: '15 rue du Bac, 75007 Paris', pseudo: 'pdurand', discord: '345678901234567890', source: 'Fuite 2024', breach: 'Doctolib' },
                { name: 'Admin System', email: 'admin@system.com', phone: '+33 1 23 45 67 89', address: '1 place du Capitole, 31000 Toulouse', pseudo: 'admin', discord: '456789012345678901', source: 'Fuite 2024', breach: 'GitHub' },
                { name: 'Jean Michel', email: 'jean.michel@email.com', phone: '+33 6 98 76 54 32', address: '5 avenue des Champs, 75008 Paris', pseudo: 'jmichel', discord: '567890123456789012', source: 'Fuite 2023', breach: 'Facebook' },
            ];
            if (results.length === 0) return;
            container.innerHTML = `
                <div class="results-bar">
                    <div class="rb-left"><span class="rb-badge">${results.length} résultat(s)</span><span class="rb-detail">en ${Math.floor(Math.random() * 40 + 10)}ms</span></div>
                    <div class="rb-right"><button class="rb-btn" onclick="alert('Export PDF')">PDF</button><button class="rb-btn" onclick="alert('Export JSON')">JSON</button></div>
                </div>
                <div class="results-list">${results.map((r, i) => `
                    <div class="result-card-glow" style="animation:cardIn 0.4s ease ${i*0.07}s both">
                        <div class="rcg-left">
                            <div class="rcg-avatar">${r.name.charAt(0)}</div>
                            <div class="rcg-info">
                                <h4>${r.name}</h4>
                                <div class="rcg-details">
                                    <span class="rcg-detail"><svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg> ${r.email}</span>
                                    <span class="rcg-detail"><svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg> ${r.phone}</span>
                                    <span class="rcg-detail"><svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg> ${r.address}</span>
                                    <span class="rcg-detail"><svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg> ${r.pseudo}</span>
                                    <span class="rcg-detail"><svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8l8 5 8-5v10zm-8-7L4 6h16l-8 5z"/></svg> ${r.discord}</span>
                                </div>
                            </div>
                        </div>
                        <div class="rcg-right"><span class="rcg-breach">${r.breach}</span><span class="rcg-source">${r.source}</span></div>
                    </div>`).join('')}</div>`;
        }

        checkAuth();
    </script>
</body>
</html>
