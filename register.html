<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Prevname</title>
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="stylesheet" href="auth.css?v=4">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <a href="/" class="auth-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" width="32" height="32">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#7c3aed"/>
                                <stop offset="100%" stop-color="#3b82f6"/>
                            </linearGradient>
                        </defs>
                        <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
                        <path d="M16 6 L16 26 M6 16 L26 16 M10 10 L22 22 M22 10 L10 22" stroke="url(#logoGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                        <circle cx="16" cy="16" r="4" fill="url(#logoGrad)"/>
                    </svg>
                </div>
                <span>Prevname</span>
            </a>

            <div class="auth-card">
                <h1>Inscription</h1>
                <p class="auth-sub">Créez un compte pour commencer vos recherches</p>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" placeholder="votre_pseudo" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="exemple@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" placeholder="•••••••• (min 6 caractères)" required>
                    </div>
                    <div class="form-error" id="formError"></div>
                    <button type="submit" class="btn-auth">Créer mon compte</button>
                </form>

                <p class="auth-footer">Déjà un compte ? <a href="/login.html">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('formError');
            errorEl.textContent = '';
            const btn = e.target.querySelector('button');
            btn.textContent = 'Inscription...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) { errorEl.textContent = data.error; return; }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard.html';
            } catch { errorEl.textContent = 'Erreur serveur'; }
            finally { btn.textContent = 'Créer mon compte'; btn.disabled = false; }
        });
    </script>
</body>
</html>
